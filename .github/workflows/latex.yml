name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # ── 1. Run all tests (Python + Macros) ──────────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install system dependencies (TeX Live)
        run: |
          sudo apt-get update
          sudo apt-get install -y texlive-full biber python3-pygments

      - name: Run test-all via Makefile
        run: make test-all

  # ── 2. Compile LaTeX report ─────────────────────────────────────────────
  build-pdf:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install system dependencies (TeX Live)
        run: |
          sudo apt-get update
          sudo apt-get install -y texlive-full biber python3-pygments

      - name: Build full report via Makefile
        run: make all

      - name: Upload compiled PDF
        uses: actions/upload-artifact@v4
        with:
          name: report-pdf
          path: report.pdf
