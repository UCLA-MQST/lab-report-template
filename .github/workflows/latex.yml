name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # Job 1: Resolve the lowercase repository name for the container
  prepare:
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.set_image.outputs.image }}
    steps:
      - id: set_image
        run: echo "image=ghcr.io/${GITHUB_REPOSITORY,,}:latest" >> $GITHUB_OUTPUT

  # Job 2: Run the actual build inside the custom container
  build:
    needs: prepare
    runs-on: ubuntu-latest
    container:
      image: ${{ needs.prepare.outputs.image }}
      options: --user root
    
    # Force use of pre-built container environment
    env:
      VENV: /opt/venv
      PYTHON: /opt/venv/bin/python3

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache Snakemake state
        uses: actions/cache@v4
        with:
          path: |
            .snakemake
            .snakemake_cache
          key: ${{ runner.os }}-snakemake-${{ hashFiles('Snakefile', 'requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-snakemake-

      - name: Build and verify report via Makefile
        run: |
          # The environment variables VENV/PYTHON will cause Makefile
          # to skip local venv creation and use the container's tools.
          # We also force snakemake to show rule output on failure.
          make all SNAKEMAKE_ARGS="--printshellcmds"

      - name: Debug logs on failure
        if: failure()
        run: |
          echo "--- nb_to_report.log ---"
          cat logs/nb_to_report.log || true
          echo "--- qutip_bell_simulation.log ---"
          cat logs/qutip_bell_simulation.log || true

      - name: Run all tests
        run: |
          make test-all

      - name: Upload compiled PDF
        uses: actions/upload-artifact@v7
        with:
          name: report-pdf
          path: report.pdf
          if-no-files-found: error
          archive: false
