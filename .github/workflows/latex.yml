name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # Job 1: Resolve the lowercase repository name for the container
  prepare:
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.set_image.outputs.image }}
    steps:
      - id: set_image
        run: echo "image=ghcr.io/${GITHUB_REPOSITORY,,}:latest" >> $GITHUB_OUTPUT

  # Job 2: Run the actual build inside the custom container
  build:
    needs: prepare
    runs-on: ubuntu-latest
    container:
      image: ${{ needs.prepare.outputs.image }}
      options: --user root
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache Snakemake state
        uses: actions/cache@v4
        with:
          path: |
            .snakemake
            .snakemake_cache
          key: ${{ runner.os }}-snakemake-${{ hashFiles('Snakefile', 'requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-snakemake-

      - name: Build and verify report via Makefile
        run: |
          # Use the pre-installed venv from the container
          export PATH="/opt/venv/bin:$PATH"
          make all

      - name: Run all tests
        run: |
          export PATH="/opt/venv/bin:$PATH"
          make test-all

      - name: Upload compiled PDF
        uses: actions/upload-artifact@v4
        with:
          name: report-pdf
          path: report.pdf
          archive: false
